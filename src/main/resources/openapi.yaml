openapi: 3.0.3
info:
  title: Restaurant API
  description: API REST de gestion des plats et ingrédients du restaurant
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:

  /ingredients:
    get:
      summary: Retourne la liste de tous les ingrédients
      responses:
        '200':
          description: Liste des ingrédients récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'

  /ingredients/{id}:
    get:
      summary: Retourne un ingrédient par son identifiant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ingrédient trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '404':
          description: Ingrédient non trouvé
          content:
            text/plain:
              schema:
                type: string
                example: "Ingredient.id=1 is not found"

  /ingredients/{id}/stock:
    get:
      summary: Retourne la valeur du stock d'un ingrédient à un instant donné
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: at
          in: query
          required: true
          schema:
            type: string
            format: date-time
            example: "2024-01-01T00:00:00Z"
        - name: unit
          in: query
          required: true
          schema:
            type: string
            enum: [KG, L, PIECE, UNIT]
      responses:
        '200':
          description: Valeur du stock récupérée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValue'
        '400':
          description: Paramètre at ou unit manquant
          content:
            text/plain:
              schema:
                type: string
                example: "Either mandatory query parameter `at` or `unit` is not provided."
        '404':
          description: Ingrédient non trouvé
          content:
            text/plain:
              schema:
                type: string
                example: "Ingredient.id=1 is not found"

  /dishes:
    get:
      summary: Retourne la liste de tous les plats
      responses:
        '200':
          description: Liste des plats récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'

  /dishes/{id}:
    get:
      summary: Retourne un plat par son identifiant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Plat trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '404':
          description: Plat non trouvé
          content:
            text/plain:
              schema:
                type: string
                example: "Dish.id=1 is not found"

  /dishes/{id}/ingredients:
    get:
      summary: Retourne la liste des ingrédients composant un plat avec filtres optionnels
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: ingredientName
          in: query
          required: false
          description: Filtre les ingrédients dont le nom contient cette valeur (insensible à la casse)
          schema:
            type: string
            example: "tomate"
        - name: ingredientPriceAround
          in: query
          required: false
          description: Filtre les ingrédients dont le prix est dans un intervalle de ±50 autour de cette valeur
          schema:
            type: number
            format: double
            example: 1200
      responses:
        '200':
          description: Liste des ingrédients du plat récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        '404':
          description: Plat non trouvé
          content:
            text/plain:
              schema:
                type: string
                example: "Dish.id=1 is not found"

    put:
      summary: Met à jour la liste des ingrédients d'un plat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/IngredientInput'
      responses:
        '200':
          description: Ingrédients mis à jour avec succès
          content:
            text/plain:
              schema:
                type: string
                example: "Ingrédients mis à jour pour le plat 1"
        '400':
          description: Corps de requête manquant ou vide
          content:
            text/plain:
              schema:
                type: string
                example: "Corps de requête obligatoire contenant la liste d'ingrédients"
        '404':
          description: Plat non trouvé
          content:
            text/plain:
              schema:
                type: string
                example: "Dish.id=1 is not found"

components:
  schemas:

    Ingredient:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Laitue"
        price:
          type: number
          format: double
          example: 1200.0
        category:
          type: string
          enum: [VEGETABLE, ANIMAL, MARINE, DAIRY, OTHER]
          example: "VEGETABLE"
        requiredQuantity:
          type: number
          format: double
          nullable: true
          example: 0.5

    IngredientInput:
      type: object
      properties:
        id:
          type: integer
          example: 1
        requiredQuantity:
          type: number
          format: double
          example: 0.5

    Dish:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Salade César"
        dishType:
          type: string
          enum: [START, MAIN, DESSERT]
          example: "START"
        sellingPrice:
          type: number
          format: double
          example: 15000.0
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'
        dishCost:
          type: number
          format: double
          example: 1200.0
        grossMargin:
          type: number
          format: double
          example: 13800.0

    StockValue:
      type: object
      properties:
        quantity:
          type: number
          format: double
          example: 10.5
        unit:
          type: string
          enum: [KG, L, PIECE, UNIT]
          example: "KG"